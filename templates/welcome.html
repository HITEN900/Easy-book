<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Easy Book</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Poppins',sans-serif;}

/* ── CINEMATIC BARS ── */
.bar-top,.bar-bottom{
  position:fixed;left:0;width:100%;height:80px;background:#000;z-index:200;
  transition:height 1.2s cubic-bezier(.77,0,.18,1);
}
.bar-top{top:0;}
.bar-bottom{bottom:0;}
.bars-open .bar-top,.bars-open .bar-bottom{height:0;}

/* ── SKY CANVAS ── */
#skyCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;}

/* ── SCENE ── */
.scene{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;}

.mountains{
  position:absolute;bottom:38%;left:0;width:200%;height:30%;
  background:
    radial-gradient(ellipse 300px 200px at 15% 100%,#1a1a2e 0%,transparent 70%),
    radial-gradient(ellipse 400px 250px at 35% 100%,#16213e 0%,transparent 70%),
    radial-gradient(ellipse 350px 220px at 55% 100%,#1a1a2e 0%,transparent 70%),
    radial-gradient(ellipse 280px 180px at 75% 100%,#0f3460 0%,transparent 70%),
    radial-gradient(ellipse 320px 200px at 90% 100%,#16213e 0%,transparent 70%);
  animation:parallaxFar 25s linear infinite;
}
@keyframes parallaxFar{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

.city{
  position:absolute;bottom:35%;left:0;width:200%;height:22%;
  background:
    linear-gradient(180deg,transparent 20%,#0d1b2a 20%,#0d1b2a 100%) 5%   100%/3%   80%  no-repeat,
    linear-gradient(180deg,transparent 10%,#0d1b2a 10%,#0d1b2a 100%) 9%   100%/2.5% 95%  no-repeat,
    linear-gradient(180deg,transparent 30%,#111    30%,#111    100%) 13%  100%/4%   70%  no-repeat,
    linear-gradient(180deg,transparent 5%, #0d1b2a  5%,#0d1b2a 100%) 19%  100%/3.5% 99%  no-repeat,
    linear-gradient(180deg,transparent 20%,#111    20%,#111    100%) 24%  100%/2%   80%  no-repeat,
    linear-gradient(180deg,transparent 15%,#0d1b2a 15%,#0d1b2a 100%) 28% 100%/5%   88%  no-repeat,
    linear-gradient(180deg,transparent 35%,#111    35%,#111    100%) 35%  100%/3%   65%  no-repeat,
    linear-gradient(180deg,transparent 8%, #0d1b2a  8%,#0d1b2a 100%) 40%  100%/4%   96%  no-repeat,
    linear-gradient(180deg,transparent 25%,#111    25%,#111    100%) 46%  100%/2.5% 75%  no-repeat,
    linear-gradient(180deg,transparent 12%,#0d1b2a 12%,#0d1b2a 100%) 50% 100%/3.5% 90%  no-repeat,
    linear-gradient(180deg,transparent 28%,#111    28%,#111    100%) 55%  100%/2%   72%  no-repeat,
    linear-gradient(180deg,transparent 18%,#0d1b2a 18%,#0d1b2a 100%) 59% 100%/4.5% 84%  no-repeat;
  animation:parallaxCity 18s linear infinite;
}
@keyframes parallaxCity{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

.city-lights{position:absolute;bottom:35%;left:0;width:200%;height:22%;animation:parallaxCity 18s linear infinite;}
.city-lights::before,.city-lights::after{
  content:'';position:absolute;width:100%;height:100%;
  background:
    radial-gradient(circle 2px at  6% 30%,#ffd700 0%,transparent 100%),
    radial-gradient(circle 2px at 10% 15%,#fff    0%,transparent 100%),
    radial-gradient(circle 2px at 20% 22%,#ffd700 0%,transparent 100%),
    radial-gradient(circle 2px at 22%  8%,#fff    0%,transparent 100%),
    radial-gradient(circle 2px at 30% 18%,#ffd700 0%,transparent 100%),
    radial-gradient(circle 2px at 41% 10%,#fff    0%,transparent 100%),
    radial-gradient(circle 2px at 51% 14%,#ffd700 0%,transparent 100%),
    radial-gradient(circle 2px at 56% 25%,#fff    0%,transparent 100%),
    radial-gradient(circle 2px at 60% 20%,#ffd700 0%,transparent 100%);
  animation:twinkle 2s ease-in-out infinite alternate;
}
.city-lights::after{animation-delay:1s;}
@keyframes twinkle{0%{opacity:0.6}100%{opacity:1}}

.trees{
  position:absolute;bottom:35%;left:0;width:300%;height:12%;
  background:
    linear-gradient(180deg,transparent 0%,#0a3d0a 40%,#071f07 100%) 2%  100%/1.5% 100% no-repeat,
    linear-gradient(180deg,transparent 0%,#0a3d0a 40%,#071f07 100%) 5%  100%/1.2% 80%  no-repeat,
    linear-gradient(180deg,transparent 0%,#0a3d0a 40%,#071f07 100%) 8%  100%/1.8% 100% no-repeat,
    linear-gradient(180deg,transparent 0%,#0a3d0a 40%,#071f07 100%) 12% 100%/1.3% 90%  no-repeat,
    linear-gradient(180deg,transparent 0%,#0a3d0a 40%,#071f07 100%) 15% 100%/1.6% 100% no-repeat,
    linear-gradient(180deg,transparent 0%,#0a3d0a 40%,#071f07 100%) 18% 100%/1.1% 75%  no-repeat,
    linear-gradient(180deg,transparent 0%,#0a3d0a 40%,#071f07 100%) 22% 100%/1.9% 100% no-repeat,
    linear-gradient(180deg,transparent 0%,#0a3d0a 40%,#071f07 100%) 26% 100%/1.4% 85%  no-repeat,
    linear-gradient(180deg,transparent 0%,#0a3d0a 40%,#071f07 100%) 30% 100%/1.7% 100% no-repeat,
    linear-gradient(180deg,transparent 0%,#0a3d0a 40%,#071f07 100%) 34% 100%/1.2% 80%  no-repeat;
  animation:parallaxTrees 6s linear infinite;
}
@keyframes parallaxTrees{0%{transform:translateX(0)}100%{transform:translateX(-33.33%)}}

.road-layer{position:absolute;bottom:0;left:0;width:100%;height:38%;background:linear-gradient(180deg,#1a1a2e 0%,#0d0d1a 20%,#111 100%);}
.road-surface{position:absolute;bottom:0;left:0;width:100%;height:60%;background:linear-gradient(180deg,#1c1c1c 0%,#111 100%);}
.road-lines{position:absolute;bottom:0;left:0;width:100%;height:60%;overflow:hidden;}
.road-lines::before{
  content:'';position:absolute;bottom:0;left:50%;
  width:4px;height:100%;
  background:repeating-linear-gradient(180deg,#ffd700 0px,#ffd700 40px,transparent 40px,transparent 80px);
  transform:translateX(-50%);
  animation:roadScroll 0.4s linear infinite;
}
.road-lines::after{
  content:'';position:absolute;bottom:0;left:0;width:100%;height:100%;
  background:
    repeating-linear-gradient(180deg,rgba(255,255,255,0.07) 0px,rgba(255,255,255,0.07) 2px,transparent 2px,transparent 80px) 15% 0/1px 100%,
    repeating-linear-gradient(180deg,rgba(255,255,255,0.07) 0px,rgba(255,255,255,0.07) 2px,transparent 2px,transparent 80px) 85% 0/1px 100%;
  animation:roadScroll 0.4s linear infinite;
}
@keyframes roadScroll{from{background-position:50% 0px,15% 0px,85% 0px}to{background-position:50% 80px,15% 80px,85% 80px}}

.ground-glow{
  position:absolute;bottom:35%;left:0;width:100%;height:6%;
  background:linear-gradient(180deg,rgba(255,200,50,0) 0%,rgba(255,200,50,0.06) 100%);
  animation:glowPulse 2s ease-in-out infinite;
}
@keyframes glowPulse{0%,100%{opacity:0.6}50%{opacity:1}}

/* ── BUS — fully left to right ── */
.bus-stage{
  position:absolute;bottom:36%;left:0;
  animation:busEnter 6s linear forwards;
}
@keyframes busEnter{
  0%   {left:-30%;opacity:0}
  5%   {opacity:1}
  100% {left:110%}
}

.bus-svg{
  width:clamp(160px,26vw,240px);
  filter:drop-shadow(0 8px 24px rgba(0,0,0,0.7)) drop-shadow(0 0 8px rgba(255,215,0,0.15));
  animation:busBob 2s ease-in-out infinite;
}
@keyframes busBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

.headlight-beam{
  position:absolute;right:-40%;top:28%;
  width:160%;height:28%;
  background:linear-gradient(90deg,rgba(255,240,150,0.18) 0%,rgba(255,240,150,0.04) 60%,transparent 100%);
  clip-path:polygon(0 40%,100% 0%,100% 100%,0 60%);
  animation:beamPulse 1.5s ease-in-out infinite;
  pointer-events:none;
}
@keyframes beamPulse{0%,100%{opacity:0.7}50%{opacity:1}}

/* ── SMOKE CANVAS ── */
#smokeCanvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:50;pointer-events:none;}

/* ── TITLE OVERLAY ── */
.title-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;
  animation:titleFadeIn 1s ease 1.2s both;
}
@keyframes titleFadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.title-badge{
  font-size:clamp(0.6rem,1.5vw,0.75rem);
  letter-spacing:5px;color:rgba(255,215,0,0.7);
  text-transform:uppercase;margin-bottom:clamp(8px,2vh,16px);
  animation:badgePulse 3s ease-in-out infinite;
}
@keyframes badgePulse{0%,100%{opacity:0.6}50%{opacity:1}}

.title-main{
  font-size:clamp(2.5rem,10vw,5.5rem);
  font-weight:900;line-height:1;letter-spacing:-2px;
  background:linear-gradient(135deg,#fff 0%,#ffd700 45%,#ff9f43 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 40px rgba(255,215,0,0.3));
  animation:titleGlow 3s ease-in-out infinite;
  margin-bottom:clamp(6px,1.5vh,14px);
}
@keyframes titleGlow{
  0%,100%{filter:drop-shadow(0 0 20px rgba(255,215,0,0.3))}
  50%{filter:drop-shadow(0 0 50px rgba(255,150,0,0.5))}
}
.title-main span{-webkit-text-fill-color:#ffd700;}

.title-sub{
  font-size:clamp(0.85rem,2.5vw,1.3rem);
  color:rgba(255,255,255,0.55);
  font-weight:300;letter-spacing:clamp(3px,1vw,8px);
  margin-bottom:clamp(24px,6vh,50px);
  text-transform:uppercase;
}

.progress-wrap{
  width:clamp(200px,40vw,380px);
  display:flex;flex-direction:column;align-items:center;gap:10px;
}
.progress-track{
  width:100%;height:2px;
  background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;
  box-shadow:0 0 10px rgba(255,215,0,0.1);
}
.progress-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,#ffd700,#ff6b6b,#ffd700);
  background-size:200% 100%;
  animation:pfill 5.5s ease-out forwards,pgradient 2s linear infinite;
  border-radius:2px;box-shadow:0 0 12px #ffd700;
}
@keyframes pfill{0%{width:0%}100%{width:100%}}
@keyframes pgradient{0%{background-position:0%}100%{background-position:200%}}

.progress-text{
  font-size:clamp(0.65rem,1.5vw,0.8rem);
  color:rgba(255,255,255,0.3);
  letter-spacing:3px;text-transform:uppercase;
  transition:opacity 0.2s;
}

/* Skip */
.skip-btn{
  position:fixed;bottom:clamp(12px,3vh,28px);right:clamp(12px,3vw,28px);
  padding:clamp(7px,1.5vh,12px) clamp(18px,4vw,32px);
  background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.5);
  border:1px solid rgba(255,215,0,0.15);border-radius:50px;
  font-size:clamp(0.7rem,1.8vw,0.85rem);font-family:'Poppins',sans-serif;
  font-weight:500;cursor:pointer;z-index:300;
  backdrop-filter:blur(10px);text-decoration:none;letter-spacing:2px;
  transition:all 0.3s;pointer-events:all;
}
.skip-btn:hover{background:rgba(255,215,0,0.1);color:#ffd700;border-color:rgba(255,215,0,0.4);}
</style>
</head>
<body>

<canvas id="skyCanvas"></canvas>

<div class="scene">
  <div class="mountains"></div>
  <div class="city"></div>
  <div class="city-lights"></div>
  <div class="trees"></div>
  <div class="road-layer">
    <div class="road-surface"></div>
    <div class="road-lines"></div>
  </div>
  <div class="ground-glow"></div>

  <div class="bus-stage" id="busStage">
    <div class="headlight-beam"></div>
    <svg class="bus-svg" viewBox="0 0 240 90" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="120" cy="88" rx="100" ry="4" fill="rgba(0,0,0,0.4)"/>
      <rect x="8" y="22" width="224" height="58" rx="8" fill="#f5f5f5"/>
      <rect x="16" y="14" width="210" height="18" rx="10" fill="#ebebeb"/>
      <rect x="8" y="22" width="224" height="58" rx="8" fill="url(#bodyGrad)"/>
      <rect x="8" y="50" width="224" height="6" fill="url(#stripeGrad)"/>
      <rect x="22" y="26" width="26" height="20" rx="4" fill="#1a2a3a"/>
      <rect x="55" y="26" width="26" height="20" rx="4" fill="#1a2a3a"/>
      <rect x="88" y="26" width="26" height="20" rx="4" fill="#1a2a3a"/>
      <rect x="121" y="26" width="26" height="20" rx="4" fill="#1a2a3a"/>
      <rect x="154" y="26" width="26" height="20" rx="4" fill="#1a2a3a"/>
      <rect x="22" y="26" width="8" height="20" rx="4" fill="rgba(255,255,255,0.08)"/>
      <rect x="55" y="26" width="8" height="20" rx="4" fill="rgba(255,255,255,0.08)"/>
      <rect x="88" y="26" width="8" height="20" rx="4" fill="rgba(255,255,255,0.08)"/>
      <rect x="121" y="26" width="8" height="20" rx="4" fill="rgba(255,255,255,0.08)"/>
      <rect x="154" y="26" width="8" height="20" rx="4" fill="rgba(255,255,255,0.08)"/>
      <rect x="186" y="50" width="22" height="28" rx="3" fill="#ddd"/>
      <rect x="186" y="50" width="22" height="28" rx="3" fill="url(#doorGrad)"/>
      <circle cx="193" cy="64" r="2" fill="#ffd700"/>
      <rect x="8" y="22" width="14" height="58" rx="4" fill="#e0e0e0"/>
      <rect x="8" y="34" width="14" height="12" rx="3" fill="#ffd700" opacity="0.9"/>
      <rect x="220" y="22" width="12" height="58" rx="4" fill="#e0e0e0"/>
      <rect x="220" y="34" width="12" height="12" rx="3" fill="#ff4444" opacity="0.7"/>
      <text x="100" y="72" font-family="Poppins,sans-serif" font-size="8" font-weight="700" fill="#4361ee" text-anchor="middle">EASY BOOK</text>
      <rect x="28" y="74" width="36" height="8" rx="4" fill="#bbb"/>
      <rect x="168" y="74" width="36" height="8" rx="4" fill="#bbb"/>
      <circle cx="46" cy="82" r="12" fill="#222"/>
      <circle cx="46" cy="82" r="8"  fill="#333"/>
      <circle cx="46" cy="82" r="3"  fill="#ffd700"/>
      <line x1="38" y1="82" x2="54" y2="82" stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
      <line x1="46" y1="74" x2="46" y2="90" stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
      <circle cx="186" cy="82" r="12" fill="#222"/>
      <circle cx="186" cy="82" r="8"  fill="#333"/>
      <circle cx="186" cy="82" r="3"  fill="#ffd700"/>
      <line x1="178" y1="82" x2="194" y2="82" stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
      <line x1="186" y1="74" x2="186" y2="90" stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
      <circle cx="12" cy="40" r="5" fill="#fff9c4" filter="url(#glow)"/>
      <defs>
        <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0"   stop-color="rgba(255,255,255,0.3)"/>
          <stop offset="0.5" stop-color="rgba(255,255,255,0)"/>
          <stop offset="1"   stop-color="rgba(0,0,0,0.15)"/>
        </linearGradient>
        <linearGradient id="stripeGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0"   stop-color="#4361ee"/>
          <stop offset="0.3" stop-color="#667eea"/>
          <stop offset="0.6" stop-color="#4cc9f0"/>
          <stop offset="1"   stop-color="#4361ee"/>
        </linearGradient>
        <linearGradient id="doorGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="rgba(0,0,0,0.1)"/>
          <stop offset="1" stop-color="rgba(0,0,0,0)"/>
        </linearGradient>
        <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
    </svg>
  </div>

  <canvas id="smokeCanvas"></canvas>
</div>

<div class="title-overlay">
  <div class="title-badge">🇮🇳 India's Premium Bus Travel</div>
  <div class="title-main">Easy<span>Book</span></div>
  <div class="title-sub">Your Journey Awaits</div>
  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill"></div>
    </div>
    <div class="progress-text" id="progressText">Preparing your journey...</div>
  </div>
</div>

<a href="{% url 'home' %}" class="skip-btn">Skip →</a>

<script>
// Cinematic open
document.body.insertAdjacentHTML('afterbegin','<div class="bar-top"></div><div class="bar-bottom"></div>');
requestAnimationFrame(()=>setTimeout(()=>document.body.classList.add('bars-open'),80));

// Stars
const sky=document.getElementById('skyCanvas');
const skCtx=sky.getContext('2d');
function resizeSky(){sky.width=window.innerWidth;sky.height=window.innerHeight;}
resizeSky();window.addEventListener('resize',resizeSky);
const stars=[];
for(let i=0;i<220;i++){
  stars.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight*0.62,r:Math.random()*1.4+0.3,a:Math.random(),speed:Math.random()*0.018+0.005});
}
function drawSky(){
  skCtx.clearRect(0,0,sky.width,sky.height);
  const g=skCtx.createLinearGradient(0,0,0,sky.height*0.65);
  g.addColorStop(0,'#000818');g.addColorStop(0.5,'#050d1a');g.addColorStop(1,'#0d1b2a');
  skCtx.fillStyle=g;skCtx.fillRect(0,0,sky.width,sky.height);
  stars.forEach(s=>{
    s.a+=s.speed;
    const al=0.35+0.65*Math.abs(Math.sin(s.a));
    skCtx.beginPath();skCtx.arc(s.x,s.y,s.r,0,Math.PI*2);
    skCtx.fillStyle=`rgba(255,255,255,${al})`;skCtx.fill();
  });
  requestAnimationFrame(drawSky);
}
drawSky();

// Smoke
const sc=document.getElementById('smokeCanvas');
const sCtx=sc.getContext('2d');
function resizeSmoke(){sc.width=sc.parentElement.offsetWidth;sc.height=sc.parentElement.offsetHeight;}
resizeSmoke();window.addEventListener('resize',resizeSmoke);
const bs=document.getElementById('busStage');
let sParticles=[];
class SP{
  constructor(x,y){
    this.x=x;this.y=y;
    this.vx=(Math.random()-0.7)*0.9;
    this.vy=-(Math.random()*1.5+0.8);
    this.r=Math.random()*5+3;
    this.maxR=this.r*(Math.random()*4+4);
    this.life=0;this.maxLife=Math.floor(Math.random()*100+100);
    const g=Math.floor(Math.random()*50+165);
    this.col=`${g},${g},${g+10}`;
    this.twist=(Math.random()-0.5)*0.03;
  }
  update(){
    this.life++;this.x+=this.vx;this.y+=this.vy;
    this.vy*=0.97;this.vx+=this.twist+(Math.random()-0.5)*0.12;
    this.r+=(this.maxR-this.r)*0.015;
  }
  alpha(){
    const t=this.life/this.maxLife;
    return t<0.2?(t/0.2)*0.38:((1-t)/0.8)*0.36;
  }
  draw(){
    const a=this.alpha();
    const g=sCtx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r);
    g.addColorStop(0,`rgba(${this.col},${a})`);
    g.addColorStop(0.45,`rgba(${this.col},${a*0.55})`);
    g.addColorStop(1,`rgba(${this.col},0)`);
    sCtx.beginPath();sCtx.arc(this.x,this.y,this.r,0,Math.PI*2);
    sCtx.fillStyle=g;sCtx.fill();
  }
  dead(){return this.life>=this.maxLife;}
}
function getOrigin(){
  const br=bs.getBoundingClientRect(),pr=sc.parentElement.getBoundingClientRect();
  return{x:br.left-pr.left+br.width*0.10,y:br.top-pr.top+8};
}
let ft=0;
function smokeLoop(){
  sCtx.clearRect(0,0,sc.width,sc.height);
  ft++;
  if(ft%3===0){
    const{x,y}=getOrigin();
    for(let i=0;i<3;i++) sParticles.push(new SP(x+(Math.random()-0.5)*8,y+(Math.random()-0.5)*5));
  }
  sParticles=sParticles.filter(p=>!p.dead());
  sParticles.forEach(p=>{p.update();p.draw();});
  requestAnimationFrame(smokeLoop);
}
smokeLoop();

// Progress text
const ptexts=["Preparing your journey...","Loading destinations...","Almost ready...","All aboard! 🚌"];
let pi=0;
const pEl=document.getElementById('progressText');
setInterval(()=>{
  pi=(pi+1)%ptexts.length;
  pEl.style.opacity='0';
  setTimeout(()=>{pEl.textContent=ptexts[pi];pEl.style.opacity='1';},200);
},1300);

// Redirect
setTimeout(()=>{window.location.href="{% url 'home' %}";},5800);
</script>
</body>
</html>
