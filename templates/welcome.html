<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>EasyBook</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: #F8F9FF;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── BACKGROUND SHAPES ── */
.bg-circle-1 {
  position: fixed;
  top: -140px; right: -100px;
  width: 420px; height: 420px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, transparent 70%);
  pointer-events: none;
  animation: bgFloat1 6s ease-in-out infinite;
}
.bg-circle-2 {
  position: fixed;
  bottom: -120px; left: -80px;
  width: 360px; height: 360px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, transparent 70%);
  pointer-events: none;
  animation: bgFloat2 7s ease-in-out infinite;
}
.bg-circle-3 {
  position: fixed;
  top: 40%; left: -60px;
  width: 200px; height: 200px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(34,197,94,0.06) 0%, transparent 70%);
  pointer-events: none;
}
@keyframes bgFloat1 { 0%,100%{transform:translate(0,0);} 50%{transform:translate(-20px,20px);} }
@keyframes bgFloat2 { 0%,100%{transform:translate(0,0);} 50%{transform:translate(20px,-20px);} }

/* ── MAIN CARD ── */
.card {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
  width: 100%;
  max-width: 420px;
}

/* ── ILLUSTRATION ── */
.illustration {
  position: relative;
  width: clamp(180px, 55vw, 260px);
  height: clamp(130px, 38vw, 180px);
  margin-bottom: 40px;
  opacity: 0;
  animation: popIn 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.3s forwards;
}

/* Road */
.road {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 28px;
  background: #E2E8F0;
  border-radius: 14px;
}
.road-dashes {
  position: absolute;
  bottom: 11px;
  left: 16px; right: 16px;
  height: 3px;
  background: repeating-linear-gradient(
    90deg,
    #CBD5E1 0px, #CBD5E1 18px,
    transparent 18px, transparent 30px
  );
  border-radius: 2px;
  overflow: hidden;
}
.road-dashes::after {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    90deg,
    #94A3B8 0px, #94A3B8 18px,
    transparent 18px, transparent 30px
  );
  animation: dashMove 0.5s linear infinite;
}
@keyframes dashMove { to { transform: translateX(-30px); } }

/* Bus SVG */
.bus-svg-wrap {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  animation: busRock 2.5s ease-in-out infinite;
}
@keyframes busRock {
  0%,100% { transform: translateX(-50%) translateY(0); }
  50%      { transform: translateX(-50%) translateY(-5px); }
}

/* Trees */
.tree-left, .tree-right {
  position: absolute;
  bottom: 24px;
}
.tree-left  { left: 0; }
.tree-right { right: 0; }

/* Sun */
.sun {
  position: absolute;
  top: 0; right: 20px;
  width: 46px; height: 46px;
  background: radial-gradient(circle, #FCD34D 40%, rgba(252,211,77,0) 70%);
  border-radius: 50%;
  animation: sunPulse 3s ease-in-out infinite;
}
.sun::after {
  content: '';
  position: absolute; inset: -8px;
  border-radius: 50%;
  border: 1.5px solid rgba(252,211,77,0.3);
  animation: sunRing 3s ease-in-out infinite;
}
@keyframes sunPulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.08);} }
@keyframes sunRing  { 0%,100%{opacity:0.5;transform:scale(1);} 50%{opacity:1;transform:scale(1.15);} }

/* Clouds */
.cloud {
  position: absolute;
  top: 12px;
  border-radius: 50px;
  background: white;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.06));
  animation: cloudDrift linear infinite;
}
.cloud-1 { left: 10px; width: 54px; height: 18px; top: 18px; animation-duration: 18s; animation-delay: 0s; }
.cloud-2 { left: 70px; width: 36px; height: 12px; top: 8px; animation-duration: 14s; animation-delay: -6s; opacity: 0.7; }
@keyframes cloudDrift { 0%{transform:translateX(0);} 50%{transform:translateX(8px);} 100%{transform:translateX(0);} }

/* ── LOGO + BRAND ── */
.brand-row {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 10px;
  opacity: 0;
  animation: fadeUp 0.7s ease 0.9s forwards;
}
.brand-icon {
  width: 44px; height: 44px;
  background: linear-gradient(135deg, #3B82F6, #6366F1);
  border-radius: 13px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(59,130,246,0.3);
  flex-shrink: 0;
}
.brand-name {
  font-size: clamp(1.8rem, 6vw, 2.3rem);
  font-weight: 800;
  color: #0F172A;
  letter-spacing: -0.5px;
  line-height: 1;
}
.brand-name span { color: #3B82F6; }

.sub-text {
  font-size: clamp(0.78rem, 2.5vw, 0.9rem);
  font-weight: 400;
  color: #94A3B8;
  letter-spacing: 0.01em;
  margin-bottom: 44px;
  opacity: 0;
  animation: fadeUp 0.7s ease 1.1s forwards;
}

/* ── PROGRESS ── */
.progress-wrap {
  width: clamp(180px, 55vw, 240px);
  opacity: 0;
  animation: fadeUp 0.7s ease 1.3s forwards;
}
.progress-track {
  width: 100%;
  height: 4px;
  background: #E2E8F0;
  border-radius: 8px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  width: 0%;
  border-radius: 8px;
  background: linear-gradient(90deg, #3B82F6, #6366F1);
  box-shadow: 0 0 8px rgba(59,130,246,0.4);
  animation: barFill 5s ease-in-out 1.5s forwards;
}
@keyframes barFill {
  0%  { width:0%; }
  25% { width:35%; }
  55% { width:62%; }
  80% { width:82%; }
  100%{ width:100%; }
}
.progress-status {
  margin-top: 12px;
  font-size: 0.72rem;
  font-weight: 500;
  color: #CBD5E1;
  text-align: center;
  transition: opacity 0.3s;
}

/* ── SKIP ── */
.skip-btn {
  display: inline-block;
  margin-top: 32px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.75rem;
  font-weight: 500;
  color: #94A3B8;
  text-decoration: none;
  letter-spacing: 0.04em;
  padding: 8px 20px;
  border: 1.5px solid #E2E8F0;
  border-radius: 50px;
  background: white;
  transition: all 0.22s ease;
  opacity: 0;
  animation: fadeUp 0.7s ease 2s forwards;
}
.skip-btn:hover {
  color: #3B82F6;
  border-color: #BFDBFE;
  background: #EFF6FF;
}

/* ── BOTTOM BADGE ── */
.badge {
  position: fixed;
  bottom: clamp(16px,3vh,28px); left: 50%;
  transform: translateX(-50%);
  display: flex; align-items: center; gap: 6px;
  padding: 7px 16px;
  background: white;
  border: 1px solid #F1F5F9;
  border-radius: 50px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  opacity: 0;
  animation: fadeUp 0.7s ease 2.2s forwards;
  white-space: nowrap;
}
.badge-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #22C55E;
  animation: liveDot 2s ease-in-out infinite;
}
@keyframes liveDot { 0%,100%{opacity:0.5;transform:scale(1);} 50%{opacity:1;transform:scale(1.3);} }
.badge-text {
  font-size: 0.65rem;
  font-weight: 600;
  color: #64748B;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes popIn {
  from { opacity:0; transform:scale(0.88); }
  to   { opacity:1; transform:scale(1); }
}
</style>
</head>
<body>

<div class="bg-circle-1"></div>
<div class="bg-circle-2"></div>
<div class="bg-circle-3"></div>

<div class="card">

  <!-- Illustration -->
  <div class="illustration">
    <!-- Sun -->
    <div class="sun"></div>
    <!-- Clouds -->
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>

    <!-- Trees left -->
    <svg class="tree-left" width="28" height="44" viewBox="0 0 28 44" fill="none">
      <rect x="12" y="30" width="4" height="14" rx="2" fill="#CBD5E1"/>
      <ellipse cx="14" cy="22" rx="10" ry="14" fill="#86EFAC"/>
      <ellipse cx="14" cy="16" rx="7"  ry="10" fill="#4ADE80"/>
    </svg>

    <!-- Trees right -->
    <svg class="tree-right" width="22" height="36" viewBox="0 0 22 36" fill="none">
      <rect x="9" y="24" width="4" height="12" rx="2" fill="#CBD5E1"/>
      <ellipse cx="11" cy="17" rx="8" ry="11" fill="#86EFAC"/>
      <ellipse cx="11" cy="11" rx="5.5" ry="8" fill="#4ADE80"/>
    </svg>

    <!-- Bus -->
    <div class="bus-svg-wrap">
      <svg width="140" height="62" viewBox="0 0 140 62" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Body -->
        <rect x="4" y="8" width="132" height="42" rx="10" fill="white"/>
        <rect x="4" y="8" width="132" height="42" rx="10" fill="url(#busBody)"/>
        <!-- Blue stripe -->
        <rect x="4" y="32" width="132" height="5" fill="url(#stripe)"/>
        <!-- Roof -->
        <rect x="10" y="4" width="120" height="8" rx="5" fill="#F1F5F9"/>
        <!-- Windows -->
        <rect x="14" y="13" width="20" height="15" rx="4" fill="#BFDBFE"/>
        <rect x="40" y="13" width="20" height="15" rx="4" fill="#BFDBFE"/>
        <rect x="66" y="13" width="20" height="15" rx="4" fill="#BFDBFE"/>
        <rect x="92" y="13" width="20" height="15" rx="4" fill="#BFDBFE"/>
        <!-- Window glare -->
        <rect x="14" y="13" width="6"  height="15" rx="3" fill="rgba(255,255,255,0.5)"/>
        <rect x="40" y="13" width="6"  height="15" rx="3" fill="rgba(255,255,255,0.5)"/>
        <rect x="66" y="13" width="6"  height="15" rx="3" fill="rgba(255,255,255,0.5)"/>
        <rect x="92" y="13" width="6"  height="15" rx="3" fill="rgba(255,255,255,0.5)"/>
        <!-- Door -->
        <rect x="116" y="30" width="14" height="19" rx="3" fill="#E0F2FE"/>
        <rect x="122" y="30" width="1.5" height="19" fill="rgba(59,130,246,0.2)"/>
        <!-- Front headlight -->
        <rect x="5"  y="18" width="8"  height="6" rx="3" fill="#FCD34D" opacity="0.9"/>
        <!-- Rear light -->
        <rect x="127" y="18" width="7" height="6" rx="3" fill="#FCA5A5" opacity="0.8"/>
        <!-- Brand text -->
        <text x="58" y="46" font-family="'Plus Jakarta Sans',sans-serif" font-size="6" font-weight="700" fill="#3B82F6" text-anchor="middle" letter-spacing="1.5">EASYBOOK</text>
        <!-- Wheels -->
        <circle cx="32"  cy="52" r="12" fill="#334155"/>
        <circle cx="32"  cy="52" r="7"  fill="#475569"/>
        <circle cx="32"  cy="52" r="3"  fill="#94A3B8"/>
        <circle cx="108" cy="52" r="12" fill="#334155"/>
        <circle cx="108" cy="52" r="7"  fill="#475569"/>
        <circle cx="108" cy="52" r="3"  fill="#94A3B8"/>
        <!-- Axle bar -->
        <rect x="18" y="48" width="28" height="5" rx="2.5" fill="#1E293B"/>
        <rect x="94" y="48" width="28" height="5" rx="2.5" fill="#1E293B"/>
        <defs>
          <linearGradient id="busBody" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="rgba(255,255,255,0.9)"/>
            <stop offset="1" stop-color="rgba(226,232,240,0.6)"/>
          </linearGradient>
          <linearGradient id="stripe" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0"   stop-color="#3B82F6"/>
            <stop offset="0.5" stop-color="#6366F1"/>
            <stop offset="1"   stop-color="#3B82F6"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <!-- Road -->
    <div class="road">
      <div class="road-dashes"></div>
    </div>
  </div>

  <!-- Brand -->
  <div class="brand-row">
    <div class="brand-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M3 16V8a2 2 0 012-2h14a2 2 0 012 2v8" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <path d="M1 16h22M7 20a1 1 0 100-2 1 1 0 000 2zM17 20a1 1 0 100-2 1 1 0 000 2z" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <path d="M8 10h8M8 13h5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="brand-name">Easy<span>Book</span></div>
  </div>

  <p class="sub-text">Book bus tickets in seconds</p>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill"></div>
    </div>
    <p class="progress-status" id="statusEl">Getting things ready...</p>
  </div>

  <a href="{% url 'home' %}" class="skip-btn">Skip intro →</a>
</div>

<!-- Live badge -->
<div class="badge">
  <div class="badge-dot"></div>
  <span class="badge-text">500+ routes live</span>
</div>

<script>
const msgs = [
  'Getting things ready...',
  'Loading routes across India...',
  'Checking seat availability...',
  'Setting up your dashboard...',
  "You're all set! 🎉"
];
let i = 0;
const el = document.getElementById('statusEl');
const timer = setInterval(() => {
  el.style.opacity = '0';
  setTimeout(() => {
    i = Math.min(i + 1, msgs.length - 1);
    el.textContent = msgs[i];
    el.style.opacity = '1';
    el.style.transition = 'opacity 0.3s';
  }, 300);
  if (i >= msgs.length - 1) clearInterval(timer);
}, 1100);

setTimeout(() => { window.location.href = "{% url 'home' %}"; }, 6000);
</script>
</body>
</html>
