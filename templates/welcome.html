<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>EasyBook — Book Bus Tickets</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep:   #020817;
  --blue:      #3b82f6;
  --blue-lt:   #60a5fa;
  --cyan:      #22d3ee;
  --indigo:    #6366f1;
  --green:     #34d399;
  --text:      #f1f5f9;
  --muted:     #64748b;
  --border:    rgba(59,130,246,0.18);
  /* Brand colors from logo */
  --teal:      #1995AD;
  --orange:    #F9A828;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg-deep);
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
}

/* ─── LAYERED BACKGROUND ─── */
.bg-layer {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 110% 60% at 20% 0%,   rgba(25,149,173,0.16) 0%, transparent 55%),
    radial-gradient(ellipse 80%  50% at 80% 100%,  rgba(249,168,40,0.09) 0%, transparent 55%),
    linear-gradient(160deg, #020c1f 0%, #020817 40%, #060214 100%);
}

.bg-grid {
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(25,149,173,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(25,149,173,0.06) 1px, transparent 1px);
  background-size: 52px 52px;
  mask-image: radial-gradient(ellipse 90% 90% at 50% 50%, black 20%, transparent 80%);
}

/* Aurora glows */
.aurora {
  position: fixed; z-index: 1;
  border-radius: 50%;
  filter: blur(110px);
  pointer-events: none;
}
.aurora-1 {
  width: 600px; height: 300px;
  top: -80px; left: -100px;
  background: radial-gradient(ellipse, rgba(25,149,173,0.2) 0%, transparent 70%);
  animation: aShift1 14s ease-in-out infinite;
}
.aurora-2 {
  width: 400px; height: 250px;
  bottom: -60px; right: -80px;
  background: radial-gradient(ellipse, rgba(249,168,40,0.12) 0%, transparent 70%);
  animation: aShift2 18s ease-in-out infinite;
}
.aurora-3 {
  width: 280px; height: 180px;
  bottom: 30%; left: 62%;
  background: radial-gradient(ellipse, rgba(25,149,173,0.08) 0%, transparent 70%);
  animation: aShift2 11s ease-in-out infinite reverse;
}
@keyframes aShift1 { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(40px,30px) scale(1.1);} }
@keyframes aShift2 { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(-30px,-20px) scale(1.08);} }

/* Shooting stars */
.shoot {
  position: fixed; z-index: 2;
  height: 1.5px; border-radius: 9px;
  background: linear-gradient(90deg, transparent, var(--teal), transparent);
  opacity: 0; pointer-events: none;
}
.shoot-1 { top:18%; left:-10%; width:180px; animation:shootAnim 7s linear 2.5s infinite; transform:rotate(-20deg); }
.shoot-2 { top:36%; left:-5%;  width:120px; animation:shootAnim 7s linear  5s  infinite; transform:rotate(-15deg); }
@keyframes shootAnim {
  0% {opacity:0;left:-15%;}  5%{opacity:1;}
  60%{opacity:0;left:115%;} 100%{opacity:0;left:115%;}
}

/* Corner accents */
.corner {
  position: fixed; width: 55px; height: 55px;
  pointer-events: none; z-index: 5;
}
.corner-tl { top:20px; left:20px;  border-top:1px solid rgba(25,149,173,0.25); border-left:1px solid rgba(25,149,173,0.25); }
.corner-br { bottom:20px; right:20px; border-bottom:1px solid rgba(25,149,173,0.25); border-right:1px solid rgba(25,149,173,0.25); }

canvas#stars {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
}

/* ─── MAIN STAGE ─── */
.stage {
  position: relative; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  width: 100%; height: 100vh;
  padding: 24px;
}

/* ─── SCENE (road illustration) ─── */
.scene {
  position: relative;
  width: clamp(260px, 70vw, 390px);
  height: clamp(100px, 26vw, 150px);
  margin-bottom: 36px;
  opacity: 0;
  animation: popIn 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.3s forwards;
}

/* Mountains */
.mountains {
  position: absolute;
  bottom: 22px; left: 0; right: 0;
  height: 55px; pointer-events: none;
}

/* City skyline */
.skyline {
  position: absolute; bottom: 22px;
  pointer-events: none;
}

/* Headlight beam */
.hbeam {
  position: absolute; bottom: 28px; left: 4px;
  width: 110px; height: 20px;
  background: linear-gradient(90deg, rgba(249,168,40,0.35), transparent);
  clip-path: polygon(0 50%, 100% 0%, 100% 100%);
  animation: hbPulse 2.2s ease-in-out infinite;
  pointer-events: none;
}
@keyframes hbPulse { 0%,100%{opacity:0.6;} 50%{opacity:1;} }

/* Exhaust puffs */
.puff {
  position: absolute; bottom: 42px; left: 8px;
  width: 9px; height: 9px; border-radius: 50%;
  background: rgba(148,163,184,0.2);
  animation: puffUp 1.8s ease-out infinite;
}
.p2{animation-delay:.6s;} .p3{animation-delay:1.2s;}
@keyframes puffUp {
  0% {opacity:.6;transform:scale(1) translate(0,0);}
  100%{opacity:0;transform:scale(3.2) translate(-18px,-22px);}
}

/* Sparkles */
.sp { position:absolute; border-radius:50%; animation:spFade 2.5s ease-in-out infinite; }
.sp1{top:6px;  right:18px; width:4px; height:4px; background:var(--teal);   animation-delay:0s;}
.sp2{top:0px;  right:56px; width:3px; height:3px; background:var(--orange); animation-delay:.8s;}
.sp3{top:16px; left:58px;  width:2px; height:2px; background:#fff;          animation-delay:1.5s;}
@keyframes spFade { 0%,100%{opacity:0;transform:scale(0);} 50%{opacity:1;transform:scale(1);} }

/* Bus wrapper */
.bus-wrap {
  position: absolute;
  bottom: 22px; left: 50%;
  transform: translateX(-50%);
  animation: busFloat 3s ease-in-out infinite;
  filter:
    drop-shadow(0 6px 22px rgba(25,149,173,0.45))
    drop-shadow(0 2px 6px rgba(0,0,0,0.6));
}
@keyframes busFloat {
  0%,100%{transform:translateX(-50%) translateY(0) rotate(0deg);}
  33%    {transform:translateX(-50%) translateY(-5px) rotate(0.3deg);}
  66%    {transform:translateX(-50%) translateY(-3px) rotate(-0.2deg);}
}

/* Road */
.road {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 26px;
  background: linear-gradient(180deg, #1a2744 0%, #0d1726 100%);
  border-radius: 13px;
  overflow: hidden;
  border: 1px solid rgba(25,149,173,0.2);
  box-shadow: 0 0 28px rgba(25,149,173,0.12);
}
.road::after {
  content:'';
  position:absolute; top:50%; left:0;
  transform:translateY(-50%);
  height:3px; width:200%;
  background: repeating-linear-gradient(
    90deg,
    rgba(25,149,173,0.5) 0px, rgba(25,149,173,0.5) 22px,
    transparent 22px, transparent 38px
  );
  animation: dashScroll .45s linear infinite;
}
@keyframes dashScroll { to{transform:translateY(-50%) translateX(-38px);} }

/* ─── BRAND LOGO BLOCK ─── */
.brand {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  opacity: 0;
  animation: fadeRise .75s ease 1s forwards;
}

/* The brand logo SVG (bus icon) */
.brand-bus-svg {
  width: clamp(72px, 18vw, 110px);
  height: auto;
  margin-bottom: 14px;
  filter: drop-shadow(0 0 18px rgba(25,149,173,0.45));
  animation: busLogoFloat 4s ease-in-out infinite;
}
@keyframes busLogoFloat {
  0%,100%{transform:translateY(0);}
  50%    {transform:translateY(-5px);}
}

.brand-name {
  font-family: 'Outfit', sans-serif;
  font-size: clamp(2.4rem, 9vw, 3.2rem);
  line-height: 1;
  letter-spacing: -1px;
  margin-bottom: 6px;
}
.brand-name .easy {
  font-weight: 800;
  color: #1995AD;
}
.brand-name .book {
  font-weight: 300;
  color: #1995AD;
}

.brand-tag {
  font-size: clamp(0.68rem, 2.2vw, 0.82rem);
  font-weight: 400;
  color: var(--muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

/* ─── DIVIDER ─── */
.divider {
  width: 1px; height: 32px;
  background: linear-gradient(180deg, transparent, rgba(25,149,173,0.45), transparent);
  margin: 20px 0;
  opacity: 0;
  animation: fadeRise .7s ease 1.2s forwards;
}

/* ─── STATS ─── */
.stats {
  display:flex; align-items:center; gap:26px;
  margin-bottom:30px;
  opacity:0;
  animation: fadeRise .7s ease 1.35s forwards;
}
.stat { text-align:center; }
.stat-n {
  font-family:'Outfit',sans-serif;
  font-size:1.06rem; font-weight:700;
  color:var(--text); line-height:1;
}
.stat-l {
  font-size:.6rem; font-weight:400; color:var(--muted);
  text-transform:uppercase; letter-spacing:.08em; margin-top:3px;
}
.stat-div { width:1px; height:26px; background:rgba(25,149,173,0.2); }

/* ─── PROGRESS ─── */
.prog-wrap {
  width: clamp(220px,62vw,285px);
  opacity:0;
  animation: fadeRise .7s ease 1.5s forwards;
}
.prog-head {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:10px;
}
.prog-label {
  font-size:.65rem; font-weight:500; color:var(--muted);
  text-transform:uppercase; letter-spacing:.1em;
}
.prog-pct {
  font-family:'Outfit',sans-serif;
  font-size:.72rem; font-weight:600; color:#1995AD;
}
.prog-track {
  position:relative; height:3px;
  background:rgba(25,149,173,0.14); border-radius:6px; overflow:hidden;
}
.prog-fill {
  height:100%; width:0%; border-radius:6px;
  background: linear-gradient(90deg, #1995AD, #F9A828);
  box-shadow: 0 0 12px rgba(25,149,173,0.7), 0 0 24px rgba(249,168,40,0.25);
  transition: width .55s ease;
  position:relative;
}
.prog-fill::after {
  content:''; position:absolute;
  right:0; top:-2px;
  width:6px; height:7px; border-radius:50%;
  background:#F9A828;
  box-shadow: 0 0 8px #F9A828;
}
.prog-status {
  margin-top:10px; text-align:center;
  font-size:.7rem; font-weight:400; color:var(--muted);
  transition:opacity .3s;
}

/* ─── SKIP ─── */
.skip-btn {
  margin-top:26px;
  display:inline-flex; align-items:center; gap:8px;
  font-family:'DM Sans',sans-serif;
  font-size:.72rem; font-weight:500; color:var(--muted);
  text-decoration:none; letter-spacing:.05em;
  padding:9px 22px;
  border:1px solid rgba(25,149,173,0.22);
  border-radius:50px;
  background:rgba(25,149,173,0.05);
  backdrop-filter:blur(8px);
  transition:all .25s ease;
  opacity:0;
  animation: fadeRise .7s ease 2s forwards;
  cursor:pointer;
}
.skip-btn:hover {
  color:#1995AD;
  border-color:rgba(25,149,173,0.5);
  background:rgba(25,149,173,0.12);
  box-shadow:0 0 20px rgba(25,149,173,0.15);
}
.arrow { transition:transform .25s; }
.skip-btn:hover .arrow { transform:translateX(3px); }

/* ─── LIVE BADGE ─── */
.live-badge {
  position:fixed;
  bottom: clamp(18px,4vh,32px); left:50%;
  transform:translateX(-50%);
  display:flex; align-items:center; gap:8px;
  padding:8px 18px;
  background:rgba(6,15,36,0.88);
  border:1px solid rgba(25,149,173,0.2);
  border-radius:50px;
  backdrop-filter:blur(16px);
  box-shadow:0 0 28px rgba(25,149,173,0.1), inset 0 1px 0 rgba(255,255,255,0.04);
  opacity:0;
  animation: fadeRise .7s ease 2.2s forwards;
  white-space:nowrap; z-index:20;
}
.live-dot {
  position:relative;
  width:7px; height:7px; border-radius:50%;
  background:var(--green);
  box-shadow:0 0 8px var(--green);
}
.live-dot::before {
  content:''; position:absolute; inset:-4px; border-radius:50%;
  background:rgba(52,211,153,0.25);
  animation:dotPing 2s ease-out infinite;
}
@keyframes dotPing { 0%{transform:scale(1);opacity:.8;} 100%{transform:scale(2.8);opacity:0;} }
.live-text {
  font-size:.63rem; font-weight:500; color:#94a3b8;
  letter-spacing:.07em; text-transform:uppercase;
}
.live-text strong { color:var(--text); font-weight:600; }

/* ─── KEYFRAMES ─── */
@keyframes popIn {
  from{opacity:0; transform:scale(0.85) translateY(20px);}
  to  {opacity:1; transform:scale(1)    translateY(0);}
}
@keyframes fadeRise {
  from{opacity:0; transform:translateY(14px);}
  to  {opacity:1; transform:translateY(0);}
}
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-grid"></div>
<div class="aurora aurora-1"></div>
<div class="aurora aurora-2"></div>
<div class="aurora aurora-3"></div>
<canvas id="stars"></canvas>
<div class="shoot shoot-1"></div>
<div class="shoot shoot-2"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-br"></div>

<!-- ══════════ STAGE ══════════ -->
<div class="stage">

  <!-- Road scene -->
  <div class="scene">
    <!-- Mountains -->
    <svg class="mountains" viewBox="0 0 390 55" fill="none">
      <polygon points="0,55 65,18 130,42 195,8 270,36 330,14 390,28 390,55" fill="rgba(14,26,52,0.75)"/>
      <polygon points="0,55 85,28 170,46 250,14 320,38 390,20 390,55" fill="rgba(10,20,42,0.85)"/>
    </svg>
    <!-- City skyline left -->
    <svg class="skyline" style="left:22px;bottom:22px;opacity:.14;" viewBox="0 0 80 36" fill="none">
      <rect x="0"  y="20" width="8"  height="16" fill="#1995AD"/>
      <rect x="10" y="10" width="10" height="26" fill="#1995AD"/>
      <rect x="22" y="16" width="7"  height="20" fill="#1995AD"/>
      <rect x="31" y="5"  width="12" height="31" fill="#1995AD"/>
      <rect x="45" y="14" width="8"  height="22" fill="#1995AD"/>
      <rect x="55" y="20" width="6"  height="16" fill="#1995AD"/>
      <rect x="63" y="12" width="9"  height="24" fill="#1995AD"/>
      <rect x="74" y="18" width="6"  height="18" fill="#1995AD"/>
    </svg>
    <!-- City skyline right -->
    <svg class="skyline" style="right:14px;bottom:22px;opacity:.1;" viewBox="0 0 60 30" fill="none">
      <rect x="0"  y="14" width="7"  height="16" fill="#F9A828"/>
      <rect x="9"  y="6"  width="9"  height="24" fill="#F9A828"/>
      <rect x="20" y="12" width="6"  height="18" fill="#F9A828"/>
      <rect x="28" y="4"  width="10" height="26" fill="#F9A828"/>
      <rect x="40" y="10" width="8"  height="20" fill="#F9A828"/>
      <rect x="50" y="16" width="6"  height="14" fill="#F9A828"/>
    </svg>

    <div class="hbeam"></div>
    <div class="puff p1"></div>
    <div class="puff p2"></div>
    <div class="puff p3"></div>
    <div class="sp sp1"></div>
    <div class="sp sp2"></div>
    <div class="sp sp3"></div>

    <!-- Animated road bus (small, scene version) -->
    <div class="bus-wrap">
      <svg width="200" height="66" viewBox="0 0 210 66" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="rb1" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"  stop-color="#1a7a8f"/>
            <stop offset="100%" stop-color="#0e4d5c"/>
          </linearGradient>
          <linearGradient id="rb2" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"  stop-color="#c47f00"/>
            <stop offset="100%" stop-color="#9a6200"/>
          </linearGradient>
          <filter id="rbs" x="-5%" y="-10%" width="115%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(25,149,173,0.5)"/>
          </filter>
        </defs>
        <!-- Body teal -->
        <rect x="4"   y="10" width="202" height="46" rx="9" fill="url(#rb1)" filter="url(#rbs)"/>
        <!-- Roof -->
        <rect x="10"  y="4"  width="190" height="10" rx="5"  fill="#135f70"/>
        <rect x="10"  y="4"  width="190" height="2"  rx="1"  fill="rgba(255,255,255,0.08)"/>
        <!-- Orange stripe -->
        <rect x="4"   y="38" width="202" height="7"   fill="#F9A828" opacity=".88"/>
        <!-- Windows -->
        <rect x="16"  y="14" width="28" height="17" rx="4" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
        <rect x="50"  y="14" width="28" height="17" rx="4" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
        <rect x="84"  y="14" width="28" height="17" rx="4" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
        <rect x="118" y="14" width="28" height="17" rx="4" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
        <!-- Window glare -->
        <rect x="16"  y="14" width="7" height="17" rx="3" fill="rgba(255,255,255,0.07)"/>
        <rect x="50"  y="14" width="7" height="17" rx="3" fill="rgba(255,255,255,0.07)"/>
        <rect x="84"  y="14" width="7" height="17" rx="3" fill="rgba(255,255,255,0.07)"/>
        <rect x="118" y="14" width="7" height="17" rx="3" fill="rgba(255,255,255,0.07)"/>
        <!-- Door -->
        <rect x="152" y="35" width="18" height="21" rx="3" fill="rgba(10,40,50,0.9)" stroke="rgba(249,168,40,0.3)" stroke-width="1"/>
        <rect x="160" y="35" width="1.5" height="21" fill="rgba(249,168,40,0.15)"/>
        <!-- Headlight -->
        <rect x="5" y="20" width="11" height="8" rx="4" fill="#fcd34d" opacity=".95"/>
        <!-- Tail light -->
        <rect x="194" y="20" width="10" height="8" rx="4" fill="#f87171" opacity=".8"/>
        <!-- EASYBOOK text -->
        <text x="86" y="51" font-family="'Outfit',sans-serif" font-size="6" font-weight="700"
              fill="rgba(255,255,255,0.55)" text-anchor="middle" letter-spacing="2.5">EASYBOOK</text>
        <!-- Bottom shadow -->
        <rect x="4" y="53" width="202" height="3" rx="1" fill="rgba(0,0,0,0.35)"/>
        <!-- Left wheel -->
        <circle cx="48"  cy="60" r="13" fill="#071015" stroke="rgba(25,149,173,0.4)" stroke-width="1.5"/>
        <circle cx="48"  cy="60" r="8"  fill="#0e2030"/>
        <circle cx="48"  cy="60" r="4"  fill="#1a3545"/>
        <circle cx="48"  cy="60" r="1.8" fill="#3a6070"/>
        <line x1="48" y1="52" x2="48" y2="68" stroke="rgba(100,116,139,0.4)" stroke-width="1"/>
        <line x1="40" y1="60" x2="56" y2="60" stroke="rgba(100,116,139,0.4)" stroke-width="1"/>
        <!-- Right wheel -->
        <circle cx="162" cy="60" r="13" fill="#071015" stroke="rgba(25,149,173,0.4)" stroke-width="1.5"/>
        <circle cx="162" cy="60" r="8"  fill="#0e2030"/>
        <circle cx="162" cy="60" r="4"  fill="#1a3545"/>
        <circle cx="162" cy="60" r="1.8" fill="#3a6070"/>
        <line x1="162" y1="52" x2="162" y2="68" stroke="rgba(100,116,139,0.4)" stroke-width="1"/>
        <line x1="154" y1="60" x2="170" y2="60" stroke="rgba(100,116,139,0.4)" stroke-width="1"/>
        <!-- Axles -->
        <rect x="30"  y="56" width="36" height="5" rx="2.5" fill="#071015"/>
        <rect x="144" y="56" width="36" height="5" rx="2.5" fill="#071015"/>
      </svg>
    </div>
    <div class="road"></div>
  </div>

  <!-- ══ BRAND LOGO (exact from provided logo) ══ -->
  <div class="brand">

    <!-- Bus icon SVG from the logo -->
    <svg class="brand-bus-svg" viewBox="0 0 540 340" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <clipPath id="windowClip">
          <rect x="235" y="100" width="100" height="90" rx="10"/>
          <rect x="345" y="100" width="85" height="90" rx="10"/>
        </clipPath>
        <filter id="logoGlow" x="-10%" y="-10%" width="120%" height="120%">
          <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="rgba(25,149,173,0.5)"/>
        </filter>
      </defs>

      <!-- Arrow/path going up-right (teal) -->
      <path fill="#1995AD"
        d="M123 173C123 118 168 73 223 73H393C408 73 421 86 421 101V128L477 80L421 32V63H223C162 63 113 112 113 173H123Z"
        transform="translate(0,-20)"
        filter="url(#logoGlow)"/>

      <!-- Main bus body (orange) -->
      <path fill="#F9A828"
        d="M213 183C213 166 226 153 243 153H483C500 153 513 166 513 183V283C513 300 500 313 483 313H243C226 313 213 300 213 283V183Z"
        filter="url(#logoGlow)"/>

<script>
/* Twinkling star canvas */
(function(){
  const c   = document.getElementById('stars');
  const ctx = c.getContext('2d');
  let W, H, stars = [];

  function resize(){
    W = c.width  = window.innerWidth;
    H = c.height = window.innerHeight;
  }
  function init(){
    stars = [];
    const n = Math.floor(W * H / 5500);
    for(let i=0;i<n;i++){
      stars.push({
        x: Math.random()*W, y: Math.random()*H,
        r: Math.random()*1.4+0.2,
        a: Math.random()*0.8+0.2,
        spd: Math.random()*0.006+0.003,
        ph: Math.random()*Math.PI*2
      });
    }
  }
  function draw(t){
    ctx.clearRect(0,0,W,H);
    for(const s of stars){
      const al = (Math.sin(t*s.spd*1000+s.ph)*0.4+0.6)*s.a;
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle = `rgba(190,220,255,${al})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  resize(); init(); requestAnimationFrame(draw);
  window.addEventListener('resize',()=>{ resize(); init(); });
})();
</script>

<script>
/* Progress bar */
const steps  = [0, 18, 38, 62, 82, 100];
const msgs   = [
  'Initializing...',
  'Loading routes across India...',
  'Syncing seat availability...',
  'Fetching live schedules...',
  'Almost there...',
  "You're all set! 🎉"
];

const fill   = document.getElementById('progFill');
const pctEl  = document.getElementById('pctEl');
const statEl = document.getElementById('statusEl');
let step = 0;

function advance(){
  if(step >= msgs.length) return;
  fill.style.width     = steps[step] + '%';
  pctEl.textContent    = steps[step] + '%';
  statEl.style.opacity = '0';
  setTimeout(()=>{
    statEl.textContent   = msgs[step];
    statEl.style.opacity = '1';
    statEl.style.transition = 'opacity .35s ease';
  }, 300);
  step++;
  if(step < msgs.length) setTimeout(advance, 1050);
}

setTimeout(advance, 1600);
setTimeout(()=>{ window.location.href = "{% url 'home' %}"; }, 7500);
</script>
