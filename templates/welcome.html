<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Easy Book - Welcome Aboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            background: #000000;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Premium Black Gradient Background */
        .background {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, #1a0b2e 0%, #0a0515 40%, #000000 100%);
            z-index: 1;
            animation: backgroundPulse 8s ease-in-out infinite;
        }

        @keyframes backgroundPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        /* Radiant Light Effects */
        .radiant-light {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255, 107, 107, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(78, 205, 196, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(102, 126, 234, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 70% 20%, rgba(155, 93, 229, 0.15) 0%, transparent 50%);
            z-index: 2;
            animation: radiantMove 15s ease-in-out infinite;
        }

        @keyframes radiantMove {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        /* Floating Particles - Responsive Count */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 3;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: clamp(2px, 0.3vw, 4px);
            height: clamp(2px, 0.3vw, 4px);
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: particleFloat 15s linear infinite;
            box-shadow: 0 0 clamp(5px, 1vw, 15px) rgba(255, 255, 255, 0.3);
        }

        /* Particle positions - responsive */
        .particle:nth-child(1) { top: 20%; left: 10%; animation-delay: 0s; }
        .particle:nth-child(2) { top: 60%; left: 20%; animation-delay: 2s; }
        .particle:nth-child(3) { top: 30%; left: 80%; animation-delay: 4s; }
        .particle:nth-child(4) { top: 70%; left: 90%; animation-delay: 6s; }
        .particle:nth-child(5) { top: 80%; left: 40%; animation-delay: 8s; }
        .particle:nth-child(6) { top: 40%; left: 60%; animation-delay: 10s; }
        .particle:nth-child(7) { top: 15%; left: 45%; animation-delay: 12s; }
        .particle:nth-child(8) { top: 85%; left: 70%; animation-delay: 14s; }

        @keyframes particleFloat {
            0% {
                transform: translateY(0) translateX(0) scale(1);
                opacity: 0.5;
            }
            100% {
                transform: translateY(-100px) translateX(20px) scale(0);
                opacity: 0;
            }
        }

        /* Main Container - Fully Responsive */
        .welcome-container {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 90%;
            max-width: 1200px;
            padding: clamp(10px, 3vw, 30px);
            margin: 0 auto;
        }

        /* Welcome Text - Responsive Font Sizes */
        .welcome-text {
            margin-bottom: clamp(15px, 5vh, 40px);
            position: relative;
        }

        .welcome-text h1 {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, #ffd700 50%, #ff6b6b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 clamp(10px, 2vw, 30px) rgba(255, 215, 0, 0.3);
            animation: glowText 3s ease-in-out infinite;
            letter-spacing: clamp(1px, 0.5vw, 3px);
            margin-bottom: clamp(5px, 2vh, 15px);
            line-height: 1.2;
            word-break: break-word;
        }

        .welcome-text h1 span {
            display: inline-block;
            animation: letterPop 4s ease-in-out infinite;
        }

        @keyframes letterPop {
            0%, 100% {
                transform: scale(1) rotate(0deg);
                filter: brightness(1);
            }
            50% {
                transform: scale(1.1) rotate(2deg);
                filter: brightness(1.2);
            }
        }

        .welcome-text p {
            font-size: clamp(1rem, 4vw, 1.8rem);
            color: rgba(255,255,255,0.9);
            font-weight: 300;
            animation: fadeInUp 1.5s ease 0.5s both;
            letter-spacing: clamp(0.5px, 0.3vw, 2px);
            line-height: 1.4;
        }

        .welcome-text p strong {
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            position: relative;
        }

        .welcome-text p strong::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ffd700, #ff6b6b, transparent);
            animation: linePulse 2s ease-in-out infinite;
        }

        @keyframes linePulse {
            0%, 100% { width: 0; left: 50%; }
            50% { width: 100%; left: 0; }
        }

        @keyframes glowText {
            0%, 100% { text-shadow: 0 0 clamp(10px, 2vw, 30px) rgba(255, 215, 0, 0.3); }
            50% { text-shadow: 0 0 clamp(20px, 4vw, 50px) rgba(255, 107, 107, 0.5); }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Animation Container - Responsive Height */
        .animation-container {
            position: relative;
            height: clamp(120px, 25vh, 200px);
            margin: clamp(10px, 3vh, 30px) 0;
            overflow: hidden;
            border-radius: 20px;
            width: 100%;
        }

        /* Road - Responsive */
        .road {
            position: absolute;
            bottom: clamp(15px, 4vh, 30px);
            left: 0;
            width: 100%;
            height: clamp(4px, 0.8vh, 8px);
            background: linear-gradient(to bottom, #2c3e50, #1a1a2e);
            box-shadow: 0 0 clamp(10px, 2vw, 30px) rgba(255, 215, 0, 0.2);
            z-index: 5;
        }

        .road::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: clamp(1px, 0.3vh, 2px);
            background: repeating-linear-gradient(
                90deg,
                #ffd700,
                #ffd700 clamp(20px, 5vw, 40px),
                transparent clamp(20px, 5vw, 40px),
                transparent clamp(40px, 10vw, 80px)
            );
            transform: translateY(-50%);
            animation: moveRoad 12s linear infinite;
        }

        @keyframes moveRoad {
            from { background-position: 0; }
            to { background-position: clamp(400px, 80vw, 800px); }
        }

        /* Bus Container - Responsive Positioning */
        .bus-container {
            position: absolute;
            bottom: clamp(10px, 3vh, 20px);
            left: -30%;
            animation: busMove 7s ease-in-out forwards;
            z-index: 10;
        }

        @keyframes busMove {
            0% { left: -30%; }
            20% { left: 5%; }
            40% { left: 20%; }
            60% { left: 35%; }
            80% { left: 50%; }
            100% { left: 60%; }
        }

        /* Bus - Fully Responsive Size */
        .bus {
            position: relative;
            width: clamp(180px, 35vw, 280px);
            height: clamp(65px, 12vh, 100px);
            filter: drop-shadow(0 clamp(5px, 2vh, 20px) clamp(10px, 3vh, 30px) rgba(0,0,0,0.5));
            animation: busBounce 2s ease-in-out infinite;
        }

        @keyframes busBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(clamp(-2px, -0.5vh, -5px)); }
        }

        /* Bus Body - White Color with Responsive Border Radius */
        .bus-body {
            position: relative;
            width: 100%;
            height: 70%;
            background: linear-gradient(135deg, #ffffff, #f0f0f0);
            border-radius: clamp(20px, 5vw, 40px) clamp(20px, 5vw, 40px) clamp(5px, 1.5vh, 15px) clamp(5px, 1.5vh, 15px);
            box-shadow: 
                0 clamp(8px, 2vh, 20px) clamp(10px, 3vh, 25px) rgba(0,0,0,0.3),
                inset 0 clamp(-3px, -0.8vh, -8px) clamp(5px, 1.5vh, 15px) rgba(0,0,0,0.1),
                inset 0 clamp(3px, 0.8vh, 8px) clamp(8px, 2vh, 20px) rgba(255,255,255,0.8);
            border: 1px solid rgba(255,255,255,0.8);
            overflow: hidden;
        }

        /* Shine Effect */
        .bus-shine {
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255,255,255,0.5), 
                transparent
            );
            transform: skewX(-20deg);
            animation: shine 4s ease-in-out infinite;
        }

        @keyframes shine {
            0%, 100% { left: -100%; }
            20% { left: 100%; }
        }

        /* Windows - Responsive */
        .windows {
            position: absolute;
            top: 20%;
            left: 10%;
            right: 10%;
            display: flex;
            gap: clamp(3px, 1vw, 10px);
        }

        .window {
            flex: 1;
            height: clamp(15px, 3.5vh, 30px);
            background: linear-gradient(135deg, #2c3e50, #1a1a2e);
            border-radius: clamp(3px, 1vw, 8px);
            border: 1px solid rgba(255,215,0,0.3);
            box-shadow: inset 0 clamp(2px, 0.5vh, 5px) clamp(3px, 0.8vh, 8px) rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .window::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255,255,255,0.2), 
                transparent
            );
            animation: windowShine 3s ease-in-out infinite;
        }

        @keyframes windowShine {
            0%, 100% { left: -100%; }
            50% { left: 100%; }
        }

        /* Door - Responsive */
        .door {
            position: absolute;
            bottom: 0;
            right: 15%;
            width: 12%;
            height: 65%;
            background: linear-gradient(135deg, #e0e0e0, #c0c0c0);
            border-radius: clamp(3px, 1vw, 8px) clamp(3px, 1vw, 8px) 0 0;
            border: 1px solid #ffd700;
            box-shadow: inset clamp(-2px, -0.5vw, -5px) clamp(-2px, -0.5vh, -5px) clamp(3px, 0.8vh, 8px) rgba(0,0,0,0.2);
        }

        .door-handle {
            position: absolute;
            top: 50%;
            left: 20%;
            width: clamp(5px, 1.5vw, 10px);
            height: clamp(5px, 1.5vw, 10px);
            background: #ffd700;
            border-radius: 50%;
            box-shadow: 0 0 clamp(5px, 1.5vw, 15px) #ffd700;
            animation: handleGlow 1s ease-in-out infinite alternate;
        }

        @keyframes handleGlow {
            from { box-shadow: 0 0 clamp(3px, 1vw, 8px) #ffd700; }
            to { box-shadow: 0 0 clamp(8px, 2vw, 20px) #ffd700; }
        }

        /* Wheels - Responsive */
        .wheels {
            position: absolute;
            bottom: -15%;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 10%;
        }

        .wheel {
            width: clamp(25px, 6vw, 45px);
            height: clamp(25px, 6vw, 45px);
            background: linear-gradient(135deg, #2c3e50, #1a1a2e);
            border-radius: 50%;
            border: clamp(2px, 0.5vw, 4px) solid #ffd700;
            box-shadow: 0 clamp(2px, 0.5vh, 5px) clamp(5px, 1.5vh, 15px) rgba(0,0,0,0.5);
            position: relative;
            animation: wheelSpin 2s linear infinite;
        }

        .wheel::before {
            content: '';
            position: absolute;
            width: 35%;
            height: 35%;
            background: #ffd700;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 clamp(5px, 1.5vw, 15px) #ffd700;
        }

        .wheel::after {
            content: '';
            position: absolute;
            width: 70%;
            height: 1px;
            background: #ffd700;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(45deg);
        }

        @keyframes wheelSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Smoke Effect - Responsive */
        .smoke {
            position: absolute;
            top: -20%;
            right: 8%;
            display: flex;
            gap: clamp(2px, 0.5vw, 5px);
            filter: blur(2px);
        }

        .smoke-puff {
            width: clamp(10px, 2.5vw, 20px);
            height: clamp(10px, 2.5vw, 20px);
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            animation: smokeRise 2.5s ease-out infinite;
            box-shadow: 0 0 clamp(8px, 2vw, 20px) rgba(255,255,255,0.2);
        }

        .smoke-puff:nth-child(1) { animation-delay: 0s; }
        .smoke-puff:nth-child(2) { animation-delay: 0.4s; }
        .smoke-puff:nth-child(3) { animation-delay: 0.8s; }
        .smoke-puff:nth-child(4) { animation-delay: 1.2s; }

        @keyframes smokeRise {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 0.4;
            }
            100% {
                transform: translate(10px, -50px) scale(1.5);
                opacity: 0;
            }
        }

        /* Headlights - Responsive */
        .headlight {
            position: absolute;
            top: 35%;
            width: clamp(8px, 2vw, 15px);
            height: clamp(8px, 2vw, 15px);
            background: #ffd700;
            border-radius: 50%;
            filter: blur(3px);
            animation: headlightBeam 0.5s ease-in-out infinite alternate;
        }

        .headlight.left {
            left: -3%;
            box-shadow: 0 0 clamp(10px, 3vw, 25px) #ffd700;
        }

        .headlight.right {
            right: -3%;
            box-shadow: 0 0 clamp(10px, 3vw, 25px) #ffd700;
        }

        @keyframes headlightBeam {
            from { opacity: 0.5; filter: blur(3px); }
            to { opacity: 1; filter: blur(5px); }
        }

        /* Progress Bar - Fully Responsive */
        .progress-container {
            width: min(90%, 500px);
            margin: clamp(15px, 5vh, 40px) auto clamp(10px, 3vh, 20px);
            position: relative;
        }

        .progress-bar {
            width: 100%;
            height: clamp(3px, 0.8vh, 6px);
            background: rgba(255,255,255,0.1);
            border-radius: clamp(1px, 0.3vh, 3px);
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 clamp(8px, 2vw, 20px) rgba(255,215,0,0.2);
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ff6b6b, #ffd700);
            background-size: 200% 100%;
            animation: gradientShift 2s linear infinite, progressFill 4s ease-out forwards;
            border-radius: clamp(1px, 0.3vh, 3px);
            box-shadow: 0 0 clamp(10px, 3vw, 25px) #ffd700;
        }

        @keyframes progressFill {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .progress-text {
            color: rgba(255,255,255,0.9);
            margin-top: clamp(5px, 2vh, 15px);
            font-size: clamp(0.8rem, 3vw, 1.1rem);
            letter-spacing: clamp(0.5px, 0.3vw, 2px);
            animation: textPulse 2s ease-in-out infinite;
        }

        @keyframes textPulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        /* Skip Button - Responsive */
        .skip-btn {
            position: absolute;
            bottom: clamp(10px, 3vh, 30px);
            right: clamp(10px, 3vw, 30px);
            padding: clamp(6px, 1.5vh, 12px) clamp(15px, 4vw, 35px);
            background: rgba(255,255,255,0.05);
            color: white;
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 50px;
            font-size: clamp(0.8rem, 2.5vw, 1rem);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 100;
            backdrop-filter: blur(10px);
            text-decoration: none;
            letter-spacing: clamp(0.5px, 0.2vw, 1px);
            overflow: hidden;
            white-space: nowrap;
        }

        .skip-btn:hover {
            background: #ffd700;
            color: #000;
            border-color: #ffd700;
            transform: translateY(-2px);
            box-shadow: 0 clamp(8px, 2vh, 20px) clamp(10px, 3vh, 30px) rgba(255,215,0,0.3);
        }

        /* Mobile Specific Overrides */
        @media (max-width: 480px) {
            .bus-container {
                animation: busMoveMobile 6s ease-in-out forwards;
            }

            @keyframes busMoveMobile {
                0% { left: -40%; }
                100% { left: 50%; transform: translateX(-50%); }
            }

            .smoke-puff {
                width: 8px;
                height: 8px;
            }

            .wheel {
                border-width: 2px;
            }

            .welcome-text h1 span {
                animation: none; /* Disable letter pop on very small screens for performance */
            }
        }

        /* Landscape Mode */
        @media (orientation: landscape) and (max-height: 600px) {
            .welcome-container {
                padding: 5px;
            }
            
            .welcome-text h1 {
                font-size: clamp(1.5rem, 5vh, 2.5rem);
            }
            
            .animation-container {
                height: 140px;
            }
            
            .bus {
                width: 200px;
                height: 70px;
            }
            
            .progress-container {
                margin: 10px auto;
            }
        }

        /* Tablet Specific */
        @media (min-width: 481px) and (max-width: 768px) {
            .bus-container {
                animation: busMoveTablet 6.5s ease-in-out forwards;
            }

            @keyframes busMoveTablet {
                0% { left: -35%; }
                100% { left: 55%; }
            }
        }

        /* Small Desktop */
        @media (min-width: 769px) and (max-width: 1024px) {
            .bus-container {
                animation: busMoveDesktop 7s ease-in-out forwards;
            }

            @keyframes busMoveDesktop {
                0% { left: -30%; }
                100% { left: 58%; }
            }
        }

        /* Hide particles on mobile for performance */
        @media (max-width: 768px) {
            .particle:nth-child(n+5) {
                display: none;
            }
        }

        /* Touch Device Optimizations */
        @media (hover: none) and (pointer: coarse) {
            .skip-btn {
                padding: 10px 25px;
                font-size: 1rem;
            }
            
            .skip-btn:hover {
                transform: none;
            }
        }

        /* High-end Devices */
        @media (min-width: 1400px) {
            .welcome-text h1 {
                font-size: 4.5rem;
            }
            
            .bus {
                width: 320px;
                height: 115px;
            }
        }
    </style>
</head>
<body>
    <!-- Black Gradient Background -->
    <div class="background"></div>
    
    <!-- Radiant Light Effects -->
    <div class="radiant-light"></div>
    
    <!-- Floating Particles -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Skip Button -->
    <a href="{% url 'home' %}" class="skip-btn">Skip →</a>

    <!-- Main Container -->
    <div class="welcome-container">
        <!-- Welcome Text with Animation -->
        <div class="welcome-text">
            <h1>
                <span>W</span><span>e</span><span>l</span><span>c</span><span>o</span><span>m</span><span>e</span>
                <span> </span>
                <span>t</span><span>o</span>
                <span> </span>
                <span>E</span><span>a</span><span>s</span><span>y</span>
                <span> </span>
                <span>B</span><span>o</span><span>o</span><span>k</span>
            </h1>
            <p><strong>Enjoy Your Journey</strong> with Easy Book</p>
        </div>

        <!-- Animation Container -->
        <div class="animation-container">
            <!-- Road -->
            <div class="road"></div>
            
            <!-- Bus with Smoke -->
            <div class="bus-container">
                <div class="bus">
                    <!-- Bus Body -->
                    <div class="bus-body">
                        <div class="bus-shine"></div>
                        
                        <!-- Windows -->
                        <div class="windows">
                            <div class="window"></div>
                            <div class="window"></div>
                            <div class="window"></div>
                            <div class="window"></div>
                        </div>
                        
                        <!-- Door -->
                        <div class="door">
                            <div class="door-handle"></div>
                        </div>
                        
                        <!-- Smoke Effect -->
                        <div class="smoke">
                            <div class="smoke-puff"></div>
                            <div class="smoke-puff"></div>
                            <div class="smoke-puff"></div>
                            <div class="smoke-puff"></div>
                        </div>
                        
                        <!-- Headlights -->
                        <div class="headlight left"></div>
                        <div class="headlight right"></div>
                    </div>
                    
                    <!-- Wheels -->
                    <div class="wheels">
                        <div class="wheel"></div>
                        <div class="wheel"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <div class="progress-text">Your journey begins...</div>
        </div>
    </div>

    <!-- Auto Redirect Script -->
    <script>
        // Update progress text
        const texts = [
            "Your journey begins...",
            "Loading destinations...",
            "Almost there...",
            "Welcome aboard! ✨"
        ];
        
        let index = 0;
        const textElement = document.querySelector('.progress-text');
        
        setInterval(() => {
            index = (index + 1) % texts.length;
            textElement.style.opacity = '0';
            setTimeout(() => {
                textElement.textContent = texts[index];
                textElement.style.opacity = '1';
            }, 200);
        }, 1000);

        // Auto redirect after animation
        setTimeout(() => {
            window.location.href = "{% url 'home' %}";
        }, 5000);

        // Performance optimization for mobile
        if (window.innerWidth <= 768) {
            // Reduce animation complexity on mobile
            document.querySelectorAll('.particle').forEach((el, index) => {
                if (index > 3) el.style.display = 'none';
            });
        }

        // Handle orientation change
        window.addEventListener('orientationchange', function() {
            setTimeout(() => {
                window.location.reload();
            }, 100);
        });
    </script>
</body>
</html>
